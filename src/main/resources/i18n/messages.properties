email.body.rental.expired.renter=Hello, {0}.\n\n The time to complete the payment for the rental of the item "{1}" has expired. As a result, the rental has been canceled.

email.subject.rental.expired.owner=Rental expired
email.body.rental.expired.owner=Hello, {0}.\n\n The time to complete the payment for the rental of your item "{1}" has expired. The rental has been canceled, and your item is now available for new rentals.


