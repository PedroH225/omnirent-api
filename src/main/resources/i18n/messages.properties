#User
email.to.null.username=user

email.footer=\n\nBest regards,\nThe OmniRent Team\n\nVisit our platform: {0}\n\nThis is an automated email. Please do not reply to this message.

email.subject.welcome=Welcome to OmniRent!
email.body.welcome=Hello {0},\n\nWelcome to OmniRent! Your account has been successfully created and you're now ready to start exploring rentals, managing your listings, and connecting with other users.\n\nWe're excited to have you with us.

email.subject.user.status.ACTIVE=Account successfully activated
email.body.user.status.ACTIVE=Hello, {0}!\n\nYour account has been successfully activated and is now available for use. You can access all platform features normally.

email.subject.user.status.INACTIVE=Account deactivated
email.body.user.status.INACTIVE=Hello, {0}!\n\nYour account has been deactivated. While it remains inactive, you will not be able to access platform features. If you do not recognize this change, please contact support.

email.subject.new_item=Item listed successfully
email.body.new_item=Hello, {0}!\n\nYour item "{1}" has been successfully listed on OmniRent and is now available for rent on the platform.\n\nOther users can now view your listing and submit rental requests.

email.subject.rental.created.owner=New rental request received
email.body.rental.created.owner=Hello, {0}!\n\nA new rental request has been created for the item "{1}".\n\nThe renter is currently completing the payment process. You will be notified once the payment has been confirmed and the request status is updated.

email.subject.rental.created.renter=Rental successfully created
email.body.rental.created.renter=Hello, {0}!\n\nYour rental for the item "{1}" has been successfully created.\n\nThe payment process has been initiated and your request is being processed. You will be notified as soon as there is an update to the rental status.

email.subject.rental.confirmed.renter=Your rental has been confirmed
email.body.rental.confirmed.renter=Hello, {0}!\n\nYour rental for the item "{1}" has been successfully confirmed.\n\nThe owner has been notified and is preparing the next steps to make the item available. You will receive further updates as the rental progresses.

email.subject.rental.confirmed.owner=Payment confirmed for the rental
email.body.rental.confirmed.owner=Hello, {0}!\n\nThe payment for the rental of the item "{1}" has been successfully confirmed.\n\nThe rental is now ready to proceed to the next steps. Once you begin preparing the item, the renter will be notified automatically.

email.subject.rental.preparing.renter=Your item is being prepared
email.body.rental.preparing.renter=Hello, {0}!\n\nThe owner has started preparing the item "{1}" for your rental.\n\nEverything is progressing as expected. You will soon receive further information regarding the next steps, such as pickup or delivery of the item.

email.subject.rental.shipped.renter=Your item is on its way
email.body.rental.shipped.renter=Hello, {0}!\n\nThe item "{1}" has been shipped by the owner and is on its way.\n\nPlease stay tuned for further updates. You will be notified as soon as there is any news regarding the delivery of the item.

email.subject.rental.return_requested.renter=Item return process started
email.body.rental.return_requested.renter=Hello, {0}!\n\nThe return process for the item "{1}" has started.\n\nPlease follow the agreed instructions to complete the return. You will receive further updates as the process progresses.

email.subject.rental.return_requested.owner=The renter has started the return process
email.body.rental.return_requested.owner=Hello, {0}!\n\nThe renter has started the return process for the item "{1}".\n\nPlease follow the next steps to receive the item back. You will be notified of any updates regarding the return process.

email.subject.rental.return_shipped.renter=Returned item is on its way
email.body.rental.return_shipped.renter=Hello, {0}!\n\nThe return of the item "{1}" has been successfully shipped.\n\nThe owner has been notified and will track the receipt of the item. You will be informed once there is an update regarding the completion of the return.

email.subject.rental.return_shipped.owner=The returned item is on its way
email.body.rental.return_shipped.owner=Hello, {0}!\n\nThe renter has shipped the item "{1}" back, and the return is now on its way.\n\nPlease keep an eye on upcoming updates and confirm receipt of the item once it arrives.

email.subject.rental.returned.renter=Return completed successfully
email.body.rental.returned.renter=Hello, {0}!\n\nThe owner has confirmed receipt of the item "{1}", and the return process has been successfully completed.\n\nThank you for using OmniRent. We hope to see you again in future rentals.

email.subject.rental.returned.owner=Return completed
email.body.rental.returned.owner=Hello, {0}!\n\nReceipt of the item "{1}" has been confirmed, and the return process has been successfully completed.\n\nThank you for using OmniRent and for completing the rental process successfully.

email.subject.rental.in_use.renter=Your rental period has started
email.body.rental.in_use.renter=Hello, {0}!\n\nThe rental period for the item "{1}" has officially started.\n\nRental period:\n• Start: {2}\n• End: {3}\n\nEnjoy your rental and keep an eye on updates from OmniRent.

email.subject.rental.in_use.owner=The rental period is now in progress
email.body.rental.in_use.owner=Hello, {0}!\n\nThe rental period for the item "{1}" is now officially in progress.\n\nRental period:\n• Start: {2}\n• End: {3}\n\nYou will continue to receive updates as the rental progresses.

email.subject.rental.late.renter=Your rental period has exceeded its scheduled end date
email.body.rental.late.renter=Hello, {0}!\n\nThe scheduled rental period for the item "{1}" ended on {2}, and we have not yet recorded the completion of the return process.\n\nIf you have already started the return process, please disregard this message. If you wish to continue using the item, please complete the payment required to renew the rental. Otherwise, we kindly ask you to arrange the return as soon as possible.\n\nYou will continue to receive updates regarding this rental.

email.subject.rental.late.owner=The rental period has exceeded its scheduled end date
email.body.rental.late.owner=Hello, {0}!\n\nThe scheduled rental period for the item "{1}" ended on {2}, but the return has not yet been recorded in the system.\n\nThe renter may either complete the return process or make the required payment to renew the rental if they wish to continue using the item.\n\nYou will continue to receive updates regarding any further activity related to this rental.