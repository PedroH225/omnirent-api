email.body.welcome=Olá, {0}!\n\nSeja bem-vindo ao OmniRent. Seu cadastro foi concluído com sucesso e sua conta está pronta para uso.\nAgora você pode explorar oportunidades de locação, anunciar itens e acompanhar suas atividades pela plataforma.\n\nAgradecemos sua confiança.

email.subject.user.status.ACTIVE=Conta ativada com sucesso
email.body.user.status.ACTIVE=Olá, {0}!\n\nSua conta foi ativada com sucesso e já está disponível para uso. Agora você pode acessar todos os recursos da plataforma normalmente.

email.subject.user.status.INACTIVE=Conta desativada
email.body.user.status.INACTIVE=Olá, {0}!\n\nSua conta foi desativada. Enquanto permanecer desativada, você não poderá acessar os recursos da plataforma. Caso não reconheça esta alteração, entre em contato com o suporte.

email.subject.new_item=Item anunciado com sucesso
email.body.new_item=Olá, {0}!\n\nSeu item "{1}" foi anunciado com sucesso no OmniRent e já está disponível para locação na plataforma.\n\nAgora outros usuários podem visualizar seu anúncio e solicitar reservas.


##CREATED
email.subject.rental.created.owner=Nova solicitação de aluguel recebida
email.body.rental.created.owner=Olá, {0}!\n\nUma nova solicitação de aluguel foi criada para o item "{1}".\n\nO locatário está realizando o processo de pagamento. Após a confirmação do pagamento, você será notificado sobre a atualização da solicitação.

email.subject.rental.created.renter=Aluguel criado com sucesso
email.body.rental.created.renter=Olá, {0}!\n\nSua solicitação de aluguel para o item "{1}" foi criada com sucesso.\n\nO processo de pagamento foi iniciado e sua solicitação está sendo processada. Você será notificado assim que houver uma atualização no status do aluguel.


##CONFIRMED
email.subject.rental.confirmed.renter=Seu aluguel foi confirmado
email.body.rental.confirmed.renter=Olá, {0}!\n\nO aluguel do item "{1}" foi confirmado com sucesso.\n\nO proprietário já foi notificado e está preparando os próximos passos para disponibilizar o item. Você receberá novas atualizações conforme o andamento do aluguel.

email.subject.rental.confirmed.owner=Pagamento confirmado para o aluguel
email.body.rental.confirmed.owner=Olá, {0}!\n\nO pagamento referente ao aluguel do item "{1}" foi confirmado com sucesso.\n\nO aluguel está pronto para seguir para as próximas etapas. Quando iniciar a preparação do item, o locatário será notificado automaticamente.


##PREPARING
email.subject.rental.preparing.renter=Seu item está sendo preparado
email.body.rental.preparing.renter=Olá, {0}!\n\nO proprietário iniciou a preparação do item "{1}" para o seu aluguel.\n\nTudo está avançando conforme o esperado. Em breve, você receberá novas informações sobre os próximos passos, como retirada ou entrega do item.

email.subject.rental.shipped.renter=Seu item está a caminho
email.body.rental.shipped.renter=Olá, {0}!\n\nO item "{1}" foi enviado pelo proprietário e está a caminho.\n\nFique atento às próximas atualizações. Você será notificado assim que houver novidades sobre a entrega do item.


##RETURN REQUESTED
email.subject.rental.return_requested.renter=Devolução do item iniciada
email.body.rental.return_requested.renter=Olá, {0}!\n\nO processo de devolução do item "{1}" foi iniciado.\n\nSiga as orientações combinadas para realizar a devolução. Você receberá novas atualizações conforme o andamento do processo.

email.subject.rental.return_requested.owner=O locatário iniciou a devolução do item
email.body.rental.return_requested.owner=Olá, {0}!\n\nO locatário iniciou o processo de devolução do item "{1}".\n\nAcompanhe as próximas etapas para receber o item de volta. Você será notificado sobre qualquer atualização relacionada à devolução.


##RETURN SHIPPED
email.subject.rental.return_shipped.renter=Item devolvido e a caminho
email.body.rental.return_shipped.renter=Olá, {0}!\n\nA devolução do item "{1}" foi enviada com sucesso.\n\nO proprietário foi notificado e acompanhará o recebimento do item. Você será informado quando houver uma atualização sobre a conclusão da devolução.

email.subject.rental.return_shipped.owner=O item devolvido está a caminho
email.body.rental.return_shipped.owner=Olá, {0}!\n\nO locatário enviou o item "{1}" de volta, e a devolução está a caminho.\n\nFique atento às próximas atualizações e confirme o recebimento do item assim que ele chegar.


##RETURNED
email.subject.rental.returned.renter=Devolução concluída com sucesso
email.body.rental.returned.renter=Olá, {0}!\n\nO proprietário confirmou o recebimento do item "{1}", e a devolução foi concluída com sucesso.\n\nObrigado por utilizar o OmniRent. Esperamos vê-lo novamente em futuras locações.

email.subject.rental.returned.owner=Devolução concluída
email.body.rental.returned.owner=Olá, {0}!\n\nO recebimento do item "{1}" foi confirmado e o processo de devolução foi concluído com sucesso.\n\nObrigado por utilizar o OmniRent e por manter sua locação em dia.


##IN USE
email.subject.rental.in_use.renter=Seu período de aluguel começou
email.body.rental.in_use.renter=Olá, {0}!\n\nO período de aluguel do item "{1}" começou oficialmente.\n\nPeríodo do aluguel:\n• Início: {2}\n• Término: {3}\n\nAproveite o item e acompanhe as atualizações do OmniRent.

email.subject.rental.in_use.owner=O período de aluguel está em andamento
email.body.rental.in_use.owner=Olá, {0}!\n\nO período de aluguel do item "{1}" está oficialmente em andamento.\n\nPeríodo do aluguel:\n• Início: {2}\n• Término: {3}\n\nVocê continuará recebendo atualizações conforme o progresso da locação.


##LATE
email.subject.rental.late.renter=O prazo da locação foi ultrapassado
email.body.rental.late.renter=Olá, {0}!\n\nO prazo previsto para a locação do item "{1}" terminou em {2}, mas ainda não registramos a conclusão da devolução.\n\nSe você já iniciou o processo de devolução, desconsidere esta mensagem. Caso deseje continuar utilizando o item, realize o pagamento correspondente à renovação da locação. Caso contrário, pedimos que providencie a devolução o quanto antes.\n\nVocê continuará recebendo atualizações sobre esta locação.

email.subject.rental.late.owner=O prazo da locação foi ultrapassado
email.body.rental.late.owner=Olá, {0}!\n\nO prazo previsto para a locação do item "{1}" terminou em {2}, mas a devolução ainda não foi registrada no sistema.\n\nO locatário poderá concluir a devolução do item ou realizar o pagamento correspondente à renovação da locação, caso deseje continuar utilizando-o.\n\nVocê continuará recebendo atualizações sobre qualquer movimentação relacionada a esta locação.


##CANCELED
email.subject.rental.canceled.renter=Aluguel cancelado
email.body.rental.canceled.renter=Olá, {0}.\n\n Informamos que o aluguel do item "{1}" foi cancelado. Caso tenha realizado um pagamento, ele será processado conforme as condições aplicáveis.

email.subject.rental.canceled.owner=Aluguel cancelado
email.body.rental.canceled.owner=Olá, {0}.\n\n Informamos que o aluguel do seu item "{1}" foi cancelado. O item está novamente disponível para novos aluguéis.


##EXPIRED
email.subject.rental.expired.renter=Prazo do aluguel expirado
email.body.rental.expired.renter=Olá, {0}.\n\n O prazo para concluir o pagamento do aluguel do item "{1}" expirou. Por isso, o aluguel foi cancelado.

email.subject.rental.expired.owner=Aluguel expirado
email.body.rental.expired.owner=Olá, {0}.\n\n O prazo para conclusão do pagamento do aluguel do seu item "{1}" expirou. O aluguel foi cancelado e o item está novamente disponível para novos aluguéis.


