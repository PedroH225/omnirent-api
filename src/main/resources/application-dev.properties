spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:sql/omnirent-db.sql,classpath:sql/schema.sql
spring.sql.init.data-locations=classpath:sql/inserts.sql

spring.jpa.hibernate.ddl-auto=validate

spring.datasource.url=jdbc:mysql://db:3306/${OMNI_DB}
spring.datasource.username=${OMNI_DB_USER}
spring.datasource.password=${OMNI_DB_PASS}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

tokenPass=${TOKEN_PASS}
app.front-url=${FRONT_URL}

stripe.api-key=${STRIPE_SECRET_KEY}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}

app.mail.from=${OMNI_EMAIL}
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${OMNI_EMAIL}
spring.mail.password=${OMNI_EMAIL_PASS}
spring.mail.transport.protocol=${MAIL_PROTOCOL}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER}
spring.rabbitmq.password=${RABBITMQ_PASS}

spring.jpa.properties.hibernate.format_sql=false 
logging.level.org.hibernate.orm.jdbc.bind=off 
logging.level.org.hibernate.SQL=DEBUG
logging.level.br.com.omnirent=DEBUG