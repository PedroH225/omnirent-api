services:
  db:
    image: mysql:latest
    container_name: omnirent-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${OMNI_DB_PASS}
      MYSQL_DATABASE: ${OMNI_DB}
    ports:
      - ${OMNI_DB_PORT}:${DOCKER_PORT}
    volumes:
      - db_data:/var/lib/mysql

  rabbitmq:
    image: rabbitmq:3-management
    container_name: omnirent-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    ports:
      - ${RABBITMQ_PORT}:5672
      - ${RABBITMQ_MANAGEMENT_PORT}:15672

volumes:
  db_data:
